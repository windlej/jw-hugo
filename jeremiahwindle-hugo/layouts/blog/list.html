{{ define "main" }}
<div class="page-header">
  <div class="page-header-inner">
    <div class="section-eyebrow mono">Writing</div>
    <h1 class="page-title">Blog</h1>
    <p class="page-intro-text">Notes from the lab, MSP trenches, and the road to enterprise infrastructure engineering.</p>
  </div>
</div>

<section class="section">
  <div class="section-inner">

    <!-- Category filter -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      {{ range .Site.Taxonomies.categories }}
        <button class="filter-btn" data-filter="{{ .Page.Title | urlize }}">{{ .Page.Title }}</button>
      {{ end }}
    </div>

    <div class="posts-grid" id="posts-grid">
      {{ range .Pages }}
      <div class="post-filter-item" data-cat="{{ range .Params.categories }}{{ . | urlize }} {{ end }}">
        {{ partial "post-card.html" . }}
      </div>
      {{ end }}
    </div>

    {{ template "_internal/pagination.html" . }}
  </div>
</section>
{{ end }}
